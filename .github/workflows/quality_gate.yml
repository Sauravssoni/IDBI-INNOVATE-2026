name: Vyapar Pulse Quality Gate

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main", "phase/*" ]

jobs:
  backend-quality:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        cache: 'pip'
        cache-dependency-path: 'backend/requirements.txt'
        
    - name: Install dependencies
      run: |
        cd backend
        python -m venv .venv
        source .venv/bin/activate
        pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt
        
    - name: Run Typecheck
      run: |
        cd backend
        source .venv/bin/activate
        mypy app/
        
    - name: Run Security Scan
      run: |
        cd backend
        source .venv/bin/activate
        bandit -r app/
        
    - name: Enforce specific nosec suppressions
      run: |
        cd backend
        if grep -rnE "# nosec\s*$" app/; then
          echo "Found rule-less # nosec! Please specify the rule ID (e.g., # nosec B311)."
          exit 1
        fi
        
    - name: Run Tests
      run: |
        cd backend
        source .venv/bin/activate
        pytest -v

  frontend-quality:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "22"
        cache: 'npm'
        cache-dependency-path: 'frontend/package-lock.json'
        
    - name: Install dependencies
      run: |
        cd frontend
        npm ci
        
    - name: Run Linter
      run: |
        cd frontend
        npm run lint
        
    - name: Run Typecheck
      run: |
        cd frontend
        npm run type-check

    - name: Production Build Dry-Run
      run: |
        cd frontend
        npm run build
