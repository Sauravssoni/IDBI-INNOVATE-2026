name: Vyapar Pulse Quality Gate

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main", "phase/*" ]

permissions:
  contents: read

jobs:
  backend-quality:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: vyapar_test
          POSTGRES_USER: vyapar_local
          POSTGRES_PASSWORD: change-this-local-development-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        cache: 'pip'
        cache-dependency-path: 'backend/requirements.txt'
        
    - name: Install dependencies
      run: |
        cd backend
        python -m venv .venv
        source .venv/bin/activate
        pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Run Ruff (Formatting and Linting)
      run: |
        cd backend
        source .venv/bin/activate
        ruff check app/
        ruff format --check app/

    - name: Run Typecheck
      run: |
        cd backend
        source .venv/bin/activate
        mypy app/
        
    - name: Run Security Scan
      run: |
        cd backend
        source .venv/bin/activate
        bandit -r app/
        
    - name: Enforce specific nosec suppressions
      run: |
        cd backend
        if grep -rnE "# nosec\s*$" app/; then
          echo "Found rule-less # nosec! Please specify the rule ID (e.g., # nosec B311)."
          exit 1
        fi
        
    - name: Run Dependency Audit
      run: |
        cd backend
        source .venv/bin/activate
        pip-audit -r requirements.txt
        
    - name: Run Database Migrations Test
      env:
        DATABASE_URL: postgresql+psycopg2://vyapar_local:change-this-local-development-password@localhost:5432/vyapar_test
      run: |
        cd backend
        source .venv/bin/activate
        alembic upgrade 05f0b4de641c
        alembic upgrade 7c35182cf1b8
        alembic downgrade 05f0b4de641c
        alembic upgrade head
        alembic check

    - name: Run Tests with Coverage
      env:
        DATABASE_URL: postgresql+psycopg2://vyapar_local:change-this-local-development-password@localhost:5432/vyapar_test
      run: |
        cd backend
        source .venv/bin/activate
        pytest -v --cov=app --cov-report=term-missing --cov-report=xml --cov-fail-under=80

    - name: Upload Coverage Artifact
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: backend/coverage.xml

  frontend-quality:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "24"
        cache: 'npm'
        cache-dependency-path: 'frontend/package-lock.json'
        
    - name: Install dependencies
      run: |
        cd frontend
        npm ci
        
    - name: Run Linter
      run: |
        cd frontend
        npm run lint
        
    - name: Run Typecheck
      run: |
        cd frontend
        npm run type-check

    - name: NPM Audit
      run: |
        cd frontend
        npm audit --audit-level=high

    - name: Production Build Dry-Run
      run: |
        cd frontend
        npm run build
