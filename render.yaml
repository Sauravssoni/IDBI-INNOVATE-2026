services:
  - type: web
    name: vyapar-pulse-backend
    env: python
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: "./render_build.sh"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.13
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: vyapar-pulse-db
          property: connectionString
      - key: DEMO_ACCESS_ENABLED
        value: "true"
      - key: DEMO_USER_PASSWORD
        value: "testpassword123"
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: "https://vyapar-pulse.vercel.app,http://localhost:3005"

databases:
  - name: vyapar-pulse-db
    region: singapore
    plan: free
    databaseName: vyapar_pulse
    user: vyapar_user
