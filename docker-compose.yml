version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: vyapar_pulse_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vyapar_local}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-this-local-development-password}
      POSTGRES_DB: ${POSTGRES_DB:-vyapar_pulse}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vyapar_local} -d ${POSTGRES_DB:-vyapar_pulse}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: vyapar_pulse_backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-vyapar_local}:${POSTGRES_PASSWORD:-change-this-local-development-password}@db:5432/${POSTGRES_DB:-vyapar_pulse}
      - APP_ENV=development
      - ALLOWED_ORIGINS=http://localhost:3005
      - COOKIE_SECURE=false
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vyapar_pulse_frontend
    command: npm run dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3005:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend

volumes:
  postgres_data:
