version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: vyapar_pulse_db
    environment:
      POSTGRES_USER: vyapar_admin
      POSTGRES_PASSWORD: vyapar_password_123
      POSTGRES_DB: vyapar_pulse
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vyapar_admin -d vyapar_pulse"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: vyapar_pulse_backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://vyapar_admin:vyapar_password_123@db:5432/vyapar_pulse
      - ENVIRONMENT=development
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vyapar_pulse_frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend

volumes:
  postgres_data:
