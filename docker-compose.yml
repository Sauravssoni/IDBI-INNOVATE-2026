
services:
  db:
    image: postgres:15-alpine
    container_name: vyapar_pulse_db
    profiles:
      - production
      - demo
      - dev
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vyapar_local}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-this-local-development-password}
      POSTGRES_DB: ${POSTGRES_DB:-vyapar_pulse}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vyapar_local} -d ${POSTGRES_DB:-vyapar_pulse}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: vyapar_pulse_backend
    profiles:
      - production
      - demo
      - dev
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - DEMO_USER_PASSWORD=${DEMO_USER_PASSWORD:?required}
      - DEMO_ACCESS_ENABLED=${DEMO_ACCESS_ENABLED:-true}
      - DEMO_RESET_ENABLED=true
      - DEMO_RESET_TOKEN=local-dev-reset-token-123
      - APP_ENV=${APP_ENV:-development}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3005}
      - COOKIE_SECURE=${COOKIE_SECURE:-false}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?required}
    container_name: vyapar_pulse_frontend
    command: npm run start
    profiles:
      - production
      - demo
    ports:
      - "3005:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:?required}
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend

  frontend-dev:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vyapar_pulse_frontend_dev
    command: npm run dev
    profiles:
      - dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3005:3005"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend

volumes:
  postgres_data:
